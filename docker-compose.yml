services:
  api:
    build: .
    image: medical-rag
    container_name: medical-rag-api
    ports:
      - "8000:8000"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - .env
    volumes:
      - model_cache:/app/.cache
    environment:
      TEMP_UPLOAD_DIR: /app/tmp_uploads
      RAG_ENGINE_TYPE: ${RAG_ENGINE_TYPE}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION}
      GOOGLE_CLOUD_BUCKET: ${GOOGLE_CLOUD_BUCKET}
      VERTEX_RAG_CORPUS_ID: ${VERTEX_RAG_CORPUS_ID}
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE}
      CHUNK_SIZE: ${CHUNK_SIZE}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_ADMIN_ROLE: ${SEED_ADMIN_ROLE}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB}
      MAX_RETRIES: ${MAX_RETRIES}
      RETRY_BASE_DELAY_SECONDS: ${RETRY_BASE_DELAY_SECONDS}
      RETRY_BACKOFF_MULTIPLIER: ${RETRY_BACKOFF_MULTIPLIER}
      RETRY_MAX_DELAY_SECONDS: ${RETRY_MAX_DELAY_SECONDS}
    restart: unless-stopped

volumes:
  model_cache:
